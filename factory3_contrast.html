<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3공장 일지 - 실재고 및 ERP대조</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <link rel="stylesheet" href="css/factory3.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    
    <script src="js/common_ui.js" defer></script>
</head>
<body>

<div class="gf3-wrapper" data-page-module="Factory3ContrastModule">
    
    <div class="gf3-header">
        <div class="gf3-title-wrap">
            <span class="material-symbols-outlined gf3-hamburger">menu</span>
            <span class="gf3-main-title">3공장 실재고 및 ERP대조</span>
            
            <div class="gf3-dropdown">
                <a href="geupji_factory3.html">3공장 일지</a>
                <a href="factory3_io.html">3공장 입출고 대장</a>
                <a href="factory3_contrast.html" class="active">3공장 실재고 및 ERP대조</a>
            </div>
        </div>
        
        <div class="gf3-controls">
            <div class="gf3-nav-group">
                <button id="gf3ContrastPrevBtn" class="gf3-icon-btn" title="이전 날짜"><span class="material-symbols-outlined">chevron_left</span></button>
                <div class="gf3-cal-wrap" id="gf3ContrastCalendarWrap">
                    <span id="gf3ContrastDateText" class="gf3-date-text cursor-pointer"></span>
                    <input type="text" id="gf3ContrastFlatpickr" style="display: none;">
                </div>
                <button id="gf3ContrastNextBtn" class="gf3-icon-btn" title="다음 날짜"><span class="material-symbols-outlined">chevron_right</span></button>
            </div>
            
            <button id="gf3ContrastTodayBtn" class="gf3-action-btn today-btn">오늘</button>
            <button id="gf3ContrastEditBtn" class="gf3-action-btn edit-btn" disabled>수정</button>
            <button id="gf3ContrastSaveBtn" class="gf3-action-btn save-btn" disabled>저장</button>
            <button id="gf3ContrastExcelBtn" class="gf3-action-btn excel-btn">
                <span class="material-symbols-outlined" style="font-size: 16px; margin-right: 4px;">table_view</span>엑셀 저장
            </button>
        </div>
    </div>

    <div class="gf3-layout">
        <div class="gf3-main-table-box" style="padding: 100px 20px; text-align: center; color: #8e8e93; font-size: 16px; font-weight: 500;">
            이곳에 실재고 및 ERP대조 레이아웃이 들어갈 예정입니다. <br><br>
            준비되시면 레이아웃 구성안을 말씀해 주세요!
        </div>
    </div>

</div>

<script src="js/factory3_utils.js"></script>
<script src="js/factory3_header.js"></script>
<script src="js/factory3_contrast_script.js"></script>
</body>
</html>
