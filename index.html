<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생산공장 통합 관리 시스템</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
        body { background-color: #f4f6f9; color: #333; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: linear-gradient(135deg, #1e3a8a, #0f172a); color: white; padding: 25px 40px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        header h1 { font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        header p { font-size: 14px; color: #94a3b8; margin-top: 5px; }
        main { flex: 1; padding: 40px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .factory-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 20px; }
        .factory-card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; text-decoration: none; color: inherit; display: flex; flex-direction: column; justify-content: space-between; }
        .factory-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-color: #3b82f6; }
        .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .card-icon { background-color: #eff6ff; color: #2563eb; padding: 12px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .factory-card:nth-child(3) .card-icon { background-color: #ecfdf5; color: #059669; }
        .card-title { font-size: 20px; font-weight: 700; color: #1e293b; }
        .card-desc { font-size: 14px; color: #64748b; line-height: 1.5; margin-bottom: 25px; }
        .card-footer { display: flex; align-items: center; justify-content: space-between; font-size: 14px; font-weight: 500; color: #2563eb; border-top: 1px solid #f1f5f9; padding-top: 15px; }
        .factory-card:nth-child(3) .card-footer { color: #059669; }
        footer { text-align: center; padding: 20px; color: #94a3b8; font-size: 13px; border-top: 1px solid #e2e8f0; background: white; }
    </style>
</head>
<body>
    <header>
        <h1><span class="material-symbols-outlined">factory</span> 통합 생산관리 포탈</h1>
        <p>각 공장별 관리 대시보드 및 일지 작성 시스템으로 이동합니다.</p>
    </header>
    <main>
        <div class="factory-grid">
            <a href="geupji_factory1.html" class="factory-card">
                <div>
                    <div class="card-header">
                        <div class="card-icon"><span class="material-symbols-outlined">precision_manufacturing</span></div>
                        <div class="card-title">제 1 공장</div>
                    </div>
                    <div class="card-desc">1공장 급지 관리 및 원자재 소요량 기록 시스템입니다.</div>
                </div>
                <div class="card-footer">
                    <span>시스템 바로가기</span><span class="material-symbols-outlined">arrow_forward</span>
                </div>
            </a>

            <a href="geupji_factory3.html" class="factory-card">
                <div>
                    <div class="card-header">
                        <div class="card-icon"><span class="material-symbols-outlined">analytics</span></div>
                        <div class="card-title">제 3 공장</div>
                    </div>
                    <div class="card-desc">3공장 급지일지 원지 잔량 실시간 연산, 완롤 잔량 분석 및 Excel 출력 시스템입니다.</div>
                </div>
                <div class="card-footer">
                    <span>시스템 바로가기</span><span class="material-symbols-outlined">arrow_forward</span>
                </div>
            </a>
        </div>
    </main>
    <footer>
        &copy; 2026 공장 관리 시스템 All Rights Reserved.
    </footer>
</body>
</html>
