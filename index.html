<!DOCTYPE html>
<html lang="ko">
<head>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
        body { background-color: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh; color: #1e293b; }

        .icon-box { background: #eff6ff; color: #2563eb; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .icon-box span { font-size: 40px; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 10px; color: #0f172a; }
        p { font-size: 15px; color: #64748b; margin-bottom: 30px; line-height: 1.5; }
        .enter-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: #2563eb; color: white; text-decoration: none; padding: 14px 24px; border-radius: 8px; font-size: 16px; font-weight: 600; width: 100%; transition: background 0.2s; }
        .enter-btn:hover { background: #1d4ed8; }
        .footer-text { margin-top: 30px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="icon-box">

        </div>

        <a href="geupji_factory3.html" class="enter-btn">
            급지일지 작성하기 <span class="material-symbols-outlined">arrow_forward</span>
        </a>
        
        <div class="footer-text">
            &copy; 2026 Factory 3 Management System.
        </div>
    </div>
</body>
</html>
