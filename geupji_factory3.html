<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3공장 급지일지</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="geupji_factory3.css">
</head>
<body>

<div class="gf3-wrapper">
    <header class="gf3-header">
        <div class="header-left">
            <a href="index.html" class="home-btn" title="메인 화면으로"><span class="material-symbols-outlined">home</span></a>
            <h2>제 3공장 급지일지</h2>
        </div>
        <div class="date-controller">
            <button id="gf3PrevBtn" class="ctrl-btn"><span class="material-symbols-outlined">chevron_left</span></button>
            <div class="date-display">
                <span class="material-symbols-outlined">calendar_month</span>
                <span id="gf3DateText">날짜 로딩 중...</span>
                <input type="text" id="gf3Flatpickr" style="display:none;">
            </div>
            <button id="gf3NextBtn" class="ctrl-btn"><span class="material-symbols-outlined">chevron_right</span></button>
            <button id="gf3TodayBtn" class="today-btn">오늘</button>
        </div>
        <div class="action-buttons">
            <button id="gf3EditBtn" class="action-btn edit" disabled><span class="material-symbols-outlined">edit</span>수정</button>
            <button id="gf3SaveBtn" class="action-btn save" disabled><span class="material-symbols-outlined">save</span>저장</button>
            <button id="gf3ExcelBtn" class="action-btn excel"><span class="material-symbols-outlined">download</span>엑셀 출력</button>
        </div>
    </header>

    <main class="gf3-container">
        <div class="main-table-section">
            <table class="gf3-table">
                <thead>
                    <tr>
                        <th style="width: 140px;">구분</th>
                        <th>788</th>
                        <th>R51</th>
                        <th>R52</th>
                        <th>R53</th>
                        <th>R54</th>
                        <th>R55</th>
                        <th style="width: 180px;">특집 메모</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="row-label">사용 전 잔량</td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="1" data-col="B" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="1" data-col="C" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="1" data-col="D" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="1" data-col="E" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="1" data-col="F" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="1" data-col="G" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input" data-row="1" data-col="H" readonly placeholder="메모 입력"></td>
                    </tr>
                    <tr>
                        <td class="row-label" rowspan="6">완 롤</td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="2" data-col="B" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="2" data-col="C" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="2" data-col="D" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="2" data-col="E" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="2" data-col="F" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="2" data-col="G" readonly></td>
                        <td class="empty-cell" rowspan="6"></td>
                    </tr>
                    <tr>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="3" data-col="B" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="3" data-col="C" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="3" data-col="D" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="3" data-col="E" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="3" data-col="F" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="3" data-col="G" readonly></td>
                    </tr>
                    <tr>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="4" data-col="B" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="4" data-col="C" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="4" data-col="D" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="4" data-col="E" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="4" data-col="F" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="4" data-col="G" readonly></td>
                    </tr>
                    <tr>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="5" data-col="B" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="5" data-col="C" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="5" data-col="D" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="5" data-col="E" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="5" data-col="F" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="5" data-col="G" readonly></td>
                    </tr>
                    <tr>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="6" data-col="B" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="6" data-col="C" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="6" data-col="D" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="6" data-col="E" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="6" data-col="F" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="6" data-col="G" readonly></td>
                    </tr>
                    <tr>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="7" data-col="B" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="7" data-col="C" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="7" data-col="D" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="7" data-col="E" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="7" data-col="F" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="7" data-col="G" readonly></td>
                    </tr>
                    <tr class="calc-row">
                        <td class="row-label">사용 전 합계</td>
                        <td><input type="text" class="gf3-input" data-row="8" data-col="B" readonly></td>
                        <td><input type="text" class="gf3-input" data-row="8" data-col="C" readonly></td>
                        <td><input type="text" class="gf3-input" data-row="8" data-col="D" readonly></td>
                        <td><input type="text" class="gf3-input" data-row="8" data-col="E" readonly></td>
                        <td><input type="text" class="gf3-input" data-row="8" data-col="F" readonly></td>
                        <td><input type="text" class="gf3-input" data-row="8" data-col="G" readonly></td>
                        <td class="empty-cell"></td>
                    </tr>
                    <tr class="calc-row text-blue">
                        <td class="row-label">사용량</td>
                        <td><input type="text" class="gf3-input" data-row="9" data-col="B" readonly></td>
                        <td><input type="text" class="gf3-input" data-row="9" data-col="C" readonly></td>
                        <td><input type="text" class="gf3-input" data-row="9" data-col="D" readonly></td>
                        <td><input type="text" class="gf3-input" data-row="9" data-col="E" readonly></td>
                        <td><input type="text" class="gf3-input" data-row="9" data-col="F" readonly></td>
                        <td><input type="text" class="gf3-input" data-row="9" data-col="G" readonly></td>
                        <td class="empty-cell"></td>
                    </tr>
                    <tr>
                        <td class="row-label">사용 후 잔량</td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="10" data-col="B" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="10" data-col="C" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="10" data-col="D" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="10" data-col="E" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="10" data-col="F" readonly></td>
                        <td class="editable"><input type="text" class="gf3-input target-calc" data-row="10" data-col="G" readonly></td>
                        <td class="empty-cell"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="side-panel-section">
            <div class="panel-card stat-card">
                <h3><span class="material-symbols-outlined">monitoring</span> 통계 요약</h3>
                <div class="form-group inline">
                    <label>사용량 총계:</label>
                    <div class="editable-wrap"><input type="text" id="statTotalUsage" class="gf3-input" readonly placeholder="지정량 kg"></div>
                </div>
                <div class="form-group inline">
                    <label>실사용량:</label>
                    <input type="text" id="statRealUsage" class="gf3-input readonly-box" readonly>
                </div>
                <div class="form-group inline">
                    <label>증감:</label>
                    <input type="text" id="statDiff" class="gf3-input readonly-box" readonly>
                </div>
                <hr>
                <div class="form-group inline">
                    <label>사용량 A (1576mm):</label>
                    <input type="text" id="statUsageA" class="gf3-input readonly-box" readonly>
                </div>
                <div class="form-group inline">
                    <label>사용량 D (788mm):</label>
                    <input type="text" id="statUsageD" class="gf3-input readonly-box" readonly>
                </div>
            </div>

            <div class="panel-card stock-card">
                <h3><span class="material-symbols-outlined">inventory_2</span> 완롤 및 급지 잔량</h3>
                
                <div class="sub-section">
                    <h4>[ 완롤 잔량 ]</h4>
                    <div class="grid-2col">
                        <div class="form-group">
                            <label>A (1576mm)</label>
                            <div class="editable-wrap"><input type="text" id="sideWanA" class="gf3-input" readonly></div>
                        </div>
                        <div class="form-group">
                            <label>D (788mm)</label>
                            <div class="editable-wrap"><input type="text" id="sideWanD" class="gf3-input" readonly></div>
                        </div>
                    </div>
                </div>

                <div class="sub-section">
                    <h4>[ 급지 재고 ]</h4>
                    <div class="grid-2col">
                        <div class="form-group">
                            <label>A 재고</label>
                            <input type="text" id="sideGeupA" class="gf3-input readonly-box" readonly>
                        </div>
                        <div class="form-group">
                            <label>D 재고</label>
                            <input type="text" id="sideGeupD" class="gf3-input readonly-box" readonly>
                        </div>
                    </div>
                </div>

                <div class="sub-section">
                    <h4>[ 급지 출고 ]</h4>
                    <div class="grid-2col">
                        <div class="form-group">
                            <label>A 출고</label>
                            <input type="text" id="sideChulgoA" class="gf3-input readonly-box" readonly>
                        </div>
                        <div class="form-group">
                            <label>D 출고</label>
                            <input type="text" id="sideChulgoD" class="gf3-input readonly-box" readonly>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="geupji_factory3_script.js"></script>
</body>
</html>
